<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katalog Bunga – Talenta Flower Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--cream:#faf6f0;--sand:#ede5d8;--blush:#e8c4b4;--rose:#c97a6a;--deep:#3d2b24;--green:#5a7a5a;--text:#2e1f19;--muted:#8a7060;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--cream);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;animation:pageIn .55s ease both;}

    @keyframes pageIn {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pageOut{to{opacity:0;transform:translateY(-14px)}}
    @keyframes navSlide{from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

    /* floating petals */
    .petal{position:fixed;border-radius:50% 0 50% 0;pointer-events:none;animation:drift linear infinite;z-index:0;}
    .petal:nth-child(1){width:55px;height:55px;background:var(--rose);top:-5%;left:5%;animation-duration:21s;animation-delay:1s;opacity:.07;}
    .petal:nth-child(2){width:35px;height:35px;background:var(--blush);top:15%;left:92%;animation-duration:17s;animation-delay:6s;opacity:.06;}
    .petal:nth-child(3){width:70px;height:70px;background:var(--green);top:55%;left:2%;animation-duration:23s;animation-delay:3s;opacity:.05;}
    @keyframes drift{0%{transform:translateY(-100px) rotate(0deg);}100%{transform:translateY(110vh) rotate(360deg);}}

    /* NAV */
    nav{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 5vw;background:var(--cream);border-bottom:1px solid var(--sand);position:relative;z-index:10;animation:navSlide .7s .1s cubic-bezier(.22,1,.36,1) both;}
    .logo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;letter-spacing:.04em;color:var(--deep);text-decoration:none;transition:opacity .3s;}
    .logo:hover{opacity:.7;}
    .logo span{color:var(--rose);font-style:italic;}
    .nav-links{display:flex;gap:2rem;list-style:none;}
    .nav-links a{text-decoration:none;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);transition:color .3s;position:relative;}
    .nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--rose);transition:width .3s;}
    .nav-links a:hover::after,.nav-links a.active::after{width:100%;}
    .nav-links a:hover,.nav-links a.active{color:var(--rose);}
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.8rem 1.8rem;border-radius:2rem;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:all .3s;cursor:pointer;border:none;}
    .btn-primary{background:var(--rose);color:#fff;box-shadow:0 4px 24px rgba(201,122,106,.35);}
    .btn-primary:hover{background:var(--deep);box-shadow:0 6px 32px rgba(61,43,36,.3);transform:translateY(-2px);}

    /* SECTION */
    section{padding:6rem 5vw;position:relative;}
    .section-label{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--rose);margin-bottom:.75rem;}
    .section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3rem);font-weight:300;line-height:1.2;margin-bottom:1rem;}
    .section-title em{font-style:italic;color:var(--rose);}

    /* CATALOG HEADER */
    .catalog-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:3rem;flex-wrap:wrap;gap:1rem;animation:fadeUp .8s .3s cubic-bezier(.22,1,.36,1) both;}
    .filter-tabs{display:flex;gap:.5rem;flex-wrap:wrap;}
    .filter-btn{padding:.4rem 1rem;border-radius:2rem;font-size:.75rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--sand);background:transparent;color:var(--muted);transition:all .25s;}
    .filter-btn.active,.filter-btn:hover{background:var(--rose);border-color:var(--rose);color:#fff;}

    /* CATALOG GRID */
    .catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2rem;}

    /* CARD – entry animation via JS-added class */
    .product-card{background:#fff;border-radius:16px;overflow:hidden;transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s;cursor:pointer;
      opacity:0;transform:translateY(32px);
    }
    .product-card.show{opacity:1;transform:translateY(0);}
    .product-card:hover{transform:translateY(-8px) scale(1.01);box-shadow:0 24px 64px rgba(61,43,36,.15);}
    .product-img{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative;overflow:hidden;}
    .product-img .bg{position:absolute;inset:0;background:linear-gradient(135deg,var(--sand),var(--blush));opacity:.6;transition:opacity .35s;}
    .product-card:hover .product-img .bg{opacity:.85;}
    /* emoji pop on hover */
    .product-img span{position:relative;z-index:1;transition:transform .4s cubic-bezier(.34,1.56,.64,1),filter .3s;}
    .product-card:hover .product-img span{transform:scale(1.25) rotate(-5deg);filter:drop-shadow(0 6px 12px rgba(0,0,0,.2));}
    .product-badge{position:absolute;top:.75rem;right:.75rem;background:var(--rose);color:#fff;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;padding:.25rem .6rem;border-radius:2rem;z-index:2;}
    .product-info{padding:1.2rem 1.4rem 1.4rem;}
    .product-cat{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem;}
    .product-name{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;margin-bottom:.3rem;}
    .product-desc{font-size:.78rem;color:var(--muted);line-height:1.6;margin-bottom:1rem;}
    .product-footer{display:flex;justify-content:space-between;align-items:center;}
    .product-price{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--rose);}
    .wa-btn{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1rem;background:#25d366;color:#fff;border-radius:2rem;font-size:.72rem;letter-spacing:.04em;text-decoration:none;transition:all .25s;}
    .wa-btn:hover{background:#128c4e;transform:translateY(-2px);box-shadow:0 4px 16px rgba(37,211,102,.4);}

    /* SCROLL REVEAL */
    .reveal{opacity:0;transform:translateY(38px);transition:opacity .75s cubic-bezier(.22,1,.36,1),transform .75s cubic-bezier(.22,1,.36,1);}
    .reveal.visible{opacity:1;transform:translateY(0);}

    footer{background:var(--deep);color:rgba(250,246,240,.5);text-align:center;padding:2rem 5vw;font-size:.78rem;letter-spacing:.04em;}
    footer a{color:var(--blush);text-decoration:none;}

    @media(max-width:768px){.nav-links{display:none;}}
  </style>
</head>
<body>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>

  <nav>
    <a class="logo" href="index.html">Talenta <span>Flower</span></a>
    <ul class="nav-links">
      <li><a href="katalog.html" class="active">Katalog</a></li>
      <li><a href="tentang.html">Tentang</a></li>
      <li><a href="pesan.html">Cara Pesan</a></li>
      <li><a href="kontak.html">Kontak</a></li>
    </ul>
    <a class="btn btn-primary" href="https://wa.me/6282336086339" target="_blank">💬 WhatsApp</a>
  </nav>

  <section id="katalog">
    <div class="catalog-header">
      <div>
        <p class="section-label">Produk Kami</p>
        <h2 class="section-title">Katalog <em>Bunga</em></h2>
      </div>
      <div class="filter-tabs">
        <button class="filter-btn active" onclick="filterCatalog('semua',this)">Semua</button>
        <button class="filter-btn" onclick="filterCatalog('rangkaian',this)">Rangkaian</button>
        <button class="filter-btn" onclick="filterCatalog('bucket',this)">Bucket</button>
        <button class="filter-btn" onclick="filterCatalog('dekorasi',this)">Dekorasi</button>
        <button class="filter-btn" onclick="filterCatalog('papan',this)">Papan Bunga</button>
      </div>
    </div>
    <div class="catalog-grid" id="catalog-grid"></div>
  </section>

  <footer class="reveal">
    <p>© 2025 <strong style="color:var(--blush)">Kios Bunga Talenta</strong> · Kota Tomohon, Sulawesi Utara</p>
    <p style="margin-top:.4rem">Website ini dibuat sebagai bagian dari program digitalisasi UMKM · <a href="https://unsrat.ac.id" target="_blank">Universitas Sam Ratulangi</a></p>
  </footer>

  <script>
    const products = [
      {id:1,kategori:'bucket',   emoji:'💐',nama:'Bucket Mawar Merah',      deskripsi:'Rangkaian mawar merah segar cocok untuk hadiah ulang tahun & anniversary.',harga:'Rp 85.000',badge:'Bestseller'},
      {id:2,kategori:'rangkaian',emoji:'🌸',nama:'Hand Bouquet Wisuda',     deskripsi:'Bouquet elegan untuk momen wisuda, tersedia berbagai pilihan warna.',harga:'Rp 120.000',badge:null},
      {id:3,kategori:'dekorasi', emoji:'🌿',nama:'Dekorasi Meja Pernikahan',deskripsi:'Sentuhan natural untuk meja resepsi pernikahan Anda yang tak terlupakan.',harga:'Rp 250.000',badge:'Custom'},
      {id:4,kategori:'papan',    emoji:'🎊',nama:'Papan Bunga Selamat',     deskripsi:'Papan bunga besar untuk ucapan selamat pembukaan usaha atau acara penting.',harga:'Rp 350.000',badge:null},
      {id:5,kategori:'bucket',   emoji:'🌻',nama:'Bucket Bunga Campuran',   deskripsi:'Perpaduan bunga segar warna-warni, harum dan tahan lama.',harga:'Rp 75.000',badge:'Hemat'},
      {id:6,kategori:'rangkaian',emoji:'🌹',nama:'Rangkaian Mawar Pink',    deskripsi:'Mawar pink lembut dalam vas, hadiah sempurna untuk orang tersayang.',harga:'Rp 95.000',badge:null},
      {id:7,kategori:'bucket',   emoji:'🌷',nama:'Bucket Tulip Pastel',     deskripsi:'Tulip import warna pastel, eksklusif dan elegan untuk hadiah spesial.',harga:'Rp 150.000',badge:'Premium'},
      {id:8,kategori:'dekorasi', emoji:'🍃',nama:'Standing Flower',         deskripsi:'Bunga berdiri cantik untuk acara seminar, konferensi, atau pameran.',harga:'Rp 300.000',badge:null},
    ];
    let activeFilter = 'semua';

    function filterCatalog(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCatalog();
    }

    function renderCatalog() {
      const grid = document.getElementById('catalog-grid');
      const filtered = activeFilter === 'semua' ? products : products.filter(p => p.kategori === activeFilter);
      grid.innerHTML = filtered.map(p => `
        <div class="product-card" data-kategori="${p.kategori}">
          <div class="product-img">
            <div class="bg"></div>
            <span>${p.emoji}</span>
            ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
          </div>
          <div class="product-info">
            <p class="product-cat">${p.kategori}</p>
            <h3 class="product-name">${p.nama}</h3>
            <p class="product-desc">${p.deskripsi}</p>
            <div class="product-footer">
              <span class="product-price">${p.harga}</span>
              <a class="wa-btn"
                href="https://wa.me/6282336086339?text=Halo%20Kios%20Bunga%20Talenta%2C%20saya%20tertarik%20dengan%20produk%20*${encodeURIComponent(p.nama)}*%20(${encodeURIComponent(p.harga)}).%20Apakah%20masih%20tersedia%3F"
                target="_blank">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Pesan
              </a>
            </div>
          </div>
        </div>
      `).join('');

      // staggered card entrance animation
      requestAnimationFrame(() => {
        document.querySelectorAll('.product-card').forEach((card, i) => {
          card.style.transition = `opacity .45s ${i * 70}ms cubic-bezier(.22,1,.36,1), transform .45s ${i * 70}ms cubic-bezier(.22,1,.36,1), box-shadow .35s`;
          requestAnimationFrame(() => card.classList.add('show'));
        });
      });
    }

    // page out
    document.querySelectorAll('a[href]').forEach(a => {
      const href = a.getAttribute('href');
      if (href && !href.startsWith('http') && !href.startsWith('#') && href !== '') {
        a.addEventListener('click', e => {
          e.preventDefault();
          document.body.style.animation = 'pageOut .32s ease forwards';
          setTimeout(() => location.href = href, 310);
        });
      }
    });
    // scroll reveal
    const io = new IntersectionObserver(entries => {
      entries.forEach((en, i) => {
        if (en.isIntersecting) { setTimeout(() => en.target.classList.add('visible'), i * 90); io.unobserve(en.target); }
      });
    }, { threshold: .12 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));

    renderCatalog();
  </script>
</body>
</html>
